<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>INH2F Tier 1 — Week 1</title>
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #0a0a0a; color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px; line-height: 1.4;
    overflow-x: hidden;
    width: 100%;
    -webkit-text-size-adjust: 100%;
  }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  .app { max-width: 760px; margin: 0 auto; padding: 12px 12px 120px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; gap: 10px;
  }
  .title { display: flex; flex-direction: column; }
  .title .brand { font-size: 11px; letter-spacing: 2px; color: #888; text-transform: uppercase; }
  .title .h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
  .title .h1 .week { color: #6ee7b7; }
  .download-btn {
    background: #1a1a1a; color: #6ee7b7;
    border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 8px 12px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .download-btn:active { background: #222; }

  .meta {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 6px; margin-bottom: 14px;
  }
  .meta .field {
    background: #111; border: 1px solid #1f1f1f; border-radius: 8px;
    padding: 8px 10px;
  }
  .meta .field label {
    display: block; font-size: 9px; letter-spacing: 1.5px;
    color: #6ee7b7; text-transform: uppercase; margin-bottom: 4px;
  }
  .meta .field input {
    width: 100%; background: transparent; color: #f0f0f0;
    border: none; outline: none; font-size: 14px; font-family: inherit;
    padding: 0;
  }

  .tabs {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 6px; margin-bottom: 16px;
  }
  .tab {
    background: #141414; color: #888;
    border: 1px solid #222; border-radius: 8px;
    padding: 10px 4px; text-align: center;
    font-size: 13px; font-weight: 700;
    cursor: pointer; min-width: 0;
  }
  .tab.active { background: #1c2a1c; color: #6ee7b7; border-color: #2d4a2d; }
  .tab .check { margin-left: 4px; color: #6ee7b7; }

  .day { display: none; }
  .day.active { display: block; }

  .section {
    background: #111; border: 1px solid #1f1f1f;
    border-radius: 10px; padding: 12px;
    margin-bottom: 12px;
  }
  .section-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px; gap: 8px; flex-wrap: wrap;
  }
  .section h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px;
    margin: 0; color: #6ee7b7;
  }
  .section .meta-line { color: #777; font-size: 11px; font-style: italic; }
  .section .timer-line { color: #aaa; font-size: 11px; margin-top: 2px; margin-bottom: 8px; }

  .exercise {
    border-top: 1px solid #1a1a1a;
    padding: 10px 0;
  }
  .exercise:first-of-type { border-top: none; padding-top: 4px; }
  .ex-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    margin-bottom: 6px;
  }
  .ex-name {
    font-size: 14px; font-weight: 600; color: #f5f5f5;
    flex: 1; min-width: 0;
  }
  .ex-tag {
    background: #1a1a1a; color: #6ee7b7;
    border: 1px solid #2d4a2d; border-radius: 4px;
    padding: 2px 6px; font-size: 10px; font-weight: 700;
    white-space: nowrap; letter-spacing: 0.5px;
  }
  .ex-detail { font-size: 12px; color: #888; margin-bottom: 8px; }
  .ex-prescribed { font-size: 12px; color: #6ee7b7; margin-bottom: 8px; font-weight: 600; }

  .input-grid {
    display: grid; gap: 6px;
  }
  .input-row {
    display: grid; grid-template-columns: 48px 1fr 1fr 70px;
    gap: 6px; align-items: center;
  }
  .input-row.no-pct { grid-template-columns: 48px 1fr 1fr; }
  .input-row.full { grid-template-columns: 1fr 1fr 70px; }
  .input-row.full.no-pct { grid-template-columns: 1fr 1fr; }
  .row-label {
    color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    text-align: center;
  }
  .input-wrap { position: relative; min-width: 0; }
  .input-wrap input {
    width: 100%; background: #0a0a0a; color: #f0f0f0;
    border: 1px solid #222; border-radius: 6px;
    padding: 9px 28px 9px 10px; font-size: 14px;
    font-family: inherit; outline: none;
    font-variant-numeric: tabular-nums;
    min-width: 0;
  }
  .input-wrap input:focus { border-color: #2d4a2d; background: #0f1410; }
  .input-wrap .unit {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    color: #555; font-size: 11px; pointer-events: none;
  }
  .input-wrap.no-unit input { padding-right: 10px; }

  .check-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; cursor: pointer;
    border-top: 1px solid #1a1a1a;
  }
  .check-row:first-of-type { border-top: none; }
  .check-box {
    width: 22px; height: 22px; flex-shrink: 0;
    border: 2px solid #333; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    background: #0a0a0a;
  }
  .check-row.done .check-box { background: #1c5e3a; border-color: #6ee7b7; }
  .check-row.done .check-box::after {
    content: "✓"; color: #fff; font-weight: bold; font-size: 14px;
  }
  .check-row.done .label { color: #6ee7b7; text-decoration: line-through; text-decoration-color: #333; }
  .label { flex: 1; font-size: 14px; min-width: 0; }

  textarea {
    width: 100%; background: #0a0a0a; color: #f0f0f0;
    border: 1px solid #222; border-radius: 6px;
    padding: 9px 10px; font-size: 14px; font-family: inherit;
    resize: vertical; min-height: 60px; outline: none;
  }
  textarea:focus { border-color: #2d4a2d; background: #0f1410; }

  .conditioning-options { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
  .cond-option {
    display: flex; align-items: flex-start; gap: 10px;
    background: #0e0e0e; border: 1px solid #1f1f1f;
    border-radius: 8px; padding: 10px; cursor: pointer;
  }
  .cond-option.active { background: #142014; border-color: #2d4a2d; }
  .cond-radio {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #333; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
  }
  .cond-option.active .cond-radio { border-color: #6ee7b7; }
  .cond-option.active .cond-radio::after {
    content: ""; width: 10px; height: 10px; border-radius: 50%;
    background: #6ee7b7;
  }
  .cond-body { flex: 1; min-width: 0; }
  .cond-name { font-size: 14px; font-weight: 600; color: #f0f0f0; }
  .cond-option.active .cond-name { color: #6ee7b7; }
  .cond-detail { font-size: 12px; color: #888; margin-top: 2px; }
  .cond-target { font-size: 11px; color: #6ee7b7; margin-top: 4px; font-weight: 600; letter-spacing: 0.5px; }

  .amrap-counter {
    background: linear-gradient(135deg, #1c2a1c, #0f1f0f);
    border: 1px solid #2d4a2d;
    border-radius: 12px; padding: 16px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .amrap-counter .count {
    font-size: 48px; font-weight: 800; color: #6ee7b7;
    font-variant-numeric: tabular-nums; min-width: 60px; text-align: center;
    line-height: 1;
  }
  .amrap-counter .label {
    color: #6ee7b7; font-size: 11px; text-transform: uppercase;
    letter-spacing: 2px; margin-top: 4px;
  }
  .amrap-counter .ctrl {
    width: 50px; height: 50px; border-radius: 50%;
    background: #0a0a0a; border: 2px solid #2d4a2d;
    color: #6ee7b7; font-size: 26px; font-weight: 700;
    cursor: pointer; flex-shrink: 0;
  }
  .amrap-counter .ctrl:active { background: #1c2a1c; }

  .complete-btn {
    width: 100%; background: #1c5e3a; color: #fff;
    border: none; border-radius: 10px;
    padding: 16px; font-size: 15px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    cursor: pointer; margin-top: 4px;
  }
  .complete-btn.done { background: #0e3a22; color: #6ee7b7; }
  .complete-btn:active { transform: scale(0.99); }

  .cardio-pick {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
    margin-top: 6px;
  }
  .cardio-pick .cp {
    background: #0e0e0e; border: 1px solid #1f1f1f;
    border-radius: 6px; padding: 8px; cursor: pointer;
    font-size: 12px; text-align: center; color: #aaa;
  }
  .cardio-pick .cp.active { background: #142014; border-color: #2d4a2d; color: #6ee7b7; }
  .cardio-pick .cp .target { display: block; font-size: 10px; color: #666; margin-top: 2px; }
  .cardio-pick .cp.active .target { color: #6ee7b7; }

  .footer {
    text-align: center; margin-top: 20px; padding: 14px;
    color: #6ee7b7; font-weight: 700; letter-spacing: 3px;
    font-size: 12px; text-transform: uppercase;
    border-top: 1px solid #1f1f1f;
  }
  .reset-link {
    display: block; text-align: center; color: #444;
    font-size: 11px; margin-top: 10px; padding: 8px;
    text-decoration: underline; cursor: pointer;
  }

  /* Very small phones */
  @media (max-width: 360px) {
    .app { padding: 10px 8px 100px; }
    .input-row { grid-template-columns: 42px 1fr 1fr 56px; gap: 4px; }
    .input-row.no-pct { grid-template-columns: 42px 1fr 1fr; }
    .meta { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <span class="brand">INH2F · Tier 1</span>
      <span class="h1">Work Capacity <span class="week">· Week 1</span></span>
    </div>
    <button class="download-btn" onclick="downloadSelf()">↓ HTML</button>
  </header>

    <div class="field"><label>Max</label><input data-meta="max" type="text" placeholder=""></div>

  </div>

  <div class="tabs" id="tabs"></div>
  <div id="days"></div>

  <div class="footer">Consistency = Results!</div>
  <span class="reset-link" onclick="resetWeek()">Reset Week 1 data</span>
</div>

// ---- State ----
function blankState() {
  return {
    meta: { max: "", acft: "", injury: "" },
    activeDay: 0,
    days: PROGRAM.days.map(d => ({
      completed: false,
      warmup: d.warmup.items.map(() => ({ done: false, weight: "", pct: "" })),
      main: (d.main ? d.main.exercises : []).map(ex => {
        if (ex.sets) return { sets: ex.sets.map(() => ({ weight: "", pct: "" })) };
        return { weight: "", pct: "" };
      }),
      circuit: (d.circuit ? d.circuit.exercises : []).map(() => ({ weight: "", pct: "" })),
      amrap: d.amrap ? {
        rounds: 0,
        exercises: d.amrap.exercises.map(() => ({ weight: "" })),
        cardio: null,
      } : null,
      conditioning: null,
      notes: "",
    })),
  };
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return blankState();
    const parsed = JSON.parse(raw);
    if (!parsed.days || parsed.days.length !== PROGRAM.days.length) return blankState();
    return parsed;
  } catch { return blankState(); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = load();

// ---- Helpers ----
function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of [].concat(children)) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}

function inputWrap(value, placeholder, unit, onInput, inputMode = "decimal") {
  const wrap = el("div", { class: "input-wrap" + (unit ? "" : " no-unit") });
  const input = el("input", {
    type: "text",
    inputmode: inputMode,
    placeholder: placeholder || "",
  });
  input.value = value || "";
  input.addEventListener("input", e => onInput(e.target.value));
  wrap.appendChild(input);
  if (unit) wrap.appendChild(el("span", { class: "unit" }, unit));
  return wrap;
}

function weightPctRow(labelText, dataObj, showPct) {
  const row = el("div", { class: "input-row" + (showPct ? "" : " no-pct") + (labelText ? "" : " full") });
  if (labelText) row.appendChild(el("div", { class: "row-label" }, labelText));
  row.appendChild(inputWrap(dataObj.weight, "weight", "lb", v => { dataObj.weight = v; save(); }));
  row.appendChild(inputWrap("", "reps", null, () => {}, "numeric"));
  // We don't track reps separately for simple inputs (program prescribes them), but show field for actual reps logged
  // Actually let's repurpose: weight | reps performed | %
  // Refactor below: we need three meaningful columns
  return row;
}

// Cleaner re-impl: always weight + (optional) reps performed + %
function inputCluster(dataObj, opts = {}) {
  // opts: { showReps: true|false, showPct: true|false, labelText: string|null }
  const showReps = opts.showReps !== false;
  const showPct = opts.showPct !== false;
  const cols = [];
  if (opts.labelText) cols.push("48px");
  cols.push("1fr");
  if (showReps) cols.push("1fr");
  if (showPct) cols.push("70px");
  const row = el("div");
  row.style.display = "grid";
  row.style.gridTemplateColumns = cols.join(" ");
  row.style.gap = "6px";
  row.style.alignItems = "center";

  if (opts.labelText) row.appendChild(el("div", { class: "row-label" }, opts.labelText));
  row.appendChild(inputWrap(dataObj.weight, "weight", "lb", v => { dataObj.weight = v; save(); }));
  if (showReps) {
    if (!("reps" in dataObj)) dataObj.reps = "";
    row.appendChild(inputWrap(dataObj.reps, "reps", null, v => { dataObj.reps = v; save(); }, "numeric"));
  }
  if (showPct) {
    if (!("pct" in dataObj)) dataObj.pct = "";
    row.appendChild(inputWrap(dataObj.pct, "%", "%", v => { dataObj.pct = v; save(); }, "decimal"));
  }
  return row;
}

// ---- Render ----
function render() {
  // meta
  document.querySelectorAll("[data-meta]").forEach(inp => {
    inp.value = state.meta[inp.dataset.meta] || "";
    inp.oninput = e => { state.meta[inp.dataset.meta] = e.target.value; save(); };
  });

  // tabs
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  PROGRAM.days.forEach((d, i) => {
    const t = el("div", { class: "tab" + (state.activeDay === i ? " active" : "") });
    t.innerHTML = `${d.title}${state.days[i].completed ? '<span class="check">✓</span>' : ""}`;
    t.onclick = () => { state.activeDay = i; save(); render(); };
    tabs.appendChild(t);
  });

  // days
  const container = document.getElementById("days");
  container.innerHTML = "";
  PROGRAM.days.forEach((d, i) => {
    const wrap = el("div", { class: "day" + (state.activeDay === i ? " active" : "") });
    wrap.appendChild(renderDay(d, state.days[i], i));
    container.appendChild(wrap);
  });
}

function renderDay(prog, data, idx) {
  const wrap = el("div");

  // Warmup
  const warm = el("div", { class: "section" });
  warm.appendChild(el("div", { class: "section-head" }, [
    el("h2", {}, prog.warmup.title.toUpperCase()),
  ]));
  if (prog.warmup.timer) warm.appendChild(el("div", { class: "timer-line" }, prog.warmup.timer));

  prog.warmup.items.forEach((item, wi) => {
    const wd = data.warmup[wi];
    const block = el("div", { class: "exercise" });

    const head = el("div", { class: "ex-head" });
    head.appendChild(el("div", { class: "ex-name" }, item.name));
    if (item.tag) head.appendChild(el("div", { class: "ex-tag" }, item.tag));
    block.appendChild(head);

    if (item.detail) block.appendChild(el("div", { class: "ex-detail" }, item.detail));
    if (item.prescribed) block.appendChild(el("div", { class: "ex-prescribed" }, item.prescribed));

    // checkbox row
    const cr = el("div", { class: "check-row" + (wd.done ? " done" : "") });
    cr.appendChild(el("div", { class: "check-box" }));
    cr.appendChild(el("div", { class: "label" }, "Mark done"));
    cr.onclick = () => { wd.done = !wd.done; save(); render(); };
    block.appendChild(cr);

    block.appendChild(inputCluster(wd, { showReps: false, showPct: true }));
    warm.appendChild(block);
  });
  wrap.appendChild(warm);

  // Main work
  if (prog.main) {
    const sec = el("div", { class: "section" });
    sec.appendChild(el("div", { class: "section-head" }, [
      el("h2", {}, prog.main.title.toUpperCase()),
    ]));
    if (prog.main.meta) sec.appendChild(el("div", { class: "meta-line" }, prog.main.meta));

    prog.main.exercises.forEach((ex, ei) => {
      const exData = data.main[ei];
      const block = el("div", { class: "exercise" });

      const head = el("div", { class: "ex-head" });
      head.appendChild(el("div", { class: "ex-name" }, ex.name));
      if (ex.tag) head.appendChild(el("div", { class: "ex-tag" }, ex.tag));
      block.appendChild(head);
      if (ex.detail) block.appendChild(el("div", { class: "ex-detail" }, ex.detail));
      if (ex.prescribed) block.appendChild(el("div", { class: "ex-prescribed" }, ex.prescribed));

      if (ex.sets) {
        ex.sets.forEach((setSpec, si) => {
          const row = el("div", { class: "input-row" });
          row.appendChild(el("div", { class: "row-label" }, setSpec.reps || `S${si + 1}`));
          row.appendChild(inputWrap(exData.sets[si].weight, "weight", "lb", v => { exData.sets[si].weight = v; save(); }));
          if (!("reps" in exData.sets[si])) exData.sets[si].reps = "";
          row.appendChild(inputWrap(exData.sets[si].reps, "reps", null, v => { exData.sets[si].reps = v; save(); }, "numeric"));
          if (!("pct" in exData.sets[si])) exData.sets[si].pct = "";
          row.appendChild(inputWrap(exData.sets[si].pct, "%", "%", v => { exData.sets[si].pct = v; save(); }, "decimal"));
          block.appendChild(row);
        });
      } else {
        block.appendChild(inputCluster(exData));
      }

      sec.appendChild(block);
    });

    wrap.appendChild(sec);
  }

  // Circuit (GPP or AFSAP)
  if (prog.circuit) {
    const sec = el("div", { class: "section" });
    sec.appendChild(el("div", { class: "section-head" }, [
      el("h2", {}, prog.circuit.title.toUpperCase()),
    ]));
    if (prog.circuit.meta) sec.appendChild(el("div", { class: "meta-line" }, prog.circuit.meta));

    prog.circuit.exercises.forEach((ex, ei) => {
      const exData = data.circuit[ei];
      const block = el("div", { class: "exercise" });
      const head = el("div", { class: "ex-head" });
      head.appendChild(el("div", { class: "ex-name" }, ex.name));
      if (ex.tag) head.appendChild(el("div", { class: "ex-tag" }, ex.tag));
      block.appendChild(head);
      if (ex.detail) block.appendChild(el("div", { class: "ex-detail" }, ex.detail));
      if (ex.prescribed) block.appendChild(el("div", { class: "ex-prescribed" }, ex.prescribed));
      block.appendChild(inputCluster(exData));
      sec.appendChild(block);
    });
    wrap.appendChild(sec);
  }

  // AMRAP (Day 4)
  if (prog.amrap) {
    const sec = el("div", { class: "section" });
    sec.appendChild(el("div", { class: "section-head" }, [
      el("h2", {}, prog.amrap.title.toUpperCase()),
    ]));
    if (prog.amrap.meta) sec.appendChild(el("div", { class: "meta-line" }, prog.amrap.meta));

    // counter
    const counter = el("div", { class: "amrap-counter" });
    const minus = el("button", { class: "ctrl" }, "−");
    minus.onclick = () => { if (data.amrap.rounds > 0) { data.amrap.rounds--; save(); render(); } };
    const center = el("div", {});
    center.style.textAlign = "center";
    const cnt = el("div", { class: "count" }, String(data.amrap.rounds));
    const lbl = el("div", { class: "label" }, "Rounds Completed");
    center.appendChild(cnt); center.appendChild(lbl);
    const plus = el("button", { class: "ctrl" }, "+");
    plus.onclick = () => { data.amrap.rounds++; save(); render(); };
    counter.appendChild(minus); counter.appendChild(center); counter.appendChild(plus);
    sec.appendChild(counter);

    prog.amrap.exercises.forEach((ex, ei) => {
      const exData = data.amrap.exercises[ei];
      const block = el("div", { class: "exercise" });
      const head = el("div", { class: "ex-head" });
      head.appendChild(el("div", { class: "ex-name" }, String.fromCharCode(65 + ei) + ") " + ex.name));
      block.appendChild(head);
      if (ex.detail) block.appendChild(el("div", { class: "ex-detail" }, ex.detail));
      if (ex.prescribed) block.appendChild(el("div", { class: "ex-prescribed" }, ex.prescribed));

      const row = el("div");
      row.style.display = "grid";
      row.style.gridTemplateColumns = "60px 1fr";
      row.style.gap = "6px";
      row.style.alignItems = "center";
      row.appendChild(el("div", { class: "row-label" }, "Weight"));
      row.appendChild(inputWrap(exData.weight, "weight", "lb", v => { exData.weight = v; save(); }));
      block.appendChild(row);
      sec.appendChild(block);
    });

    // Cardio choice
    const cardioBlock = el("div", { class: "exercise" });
    cardioBlock.appendChild(el("div", { class: "ex-name" }, "D) Cardio (choose one)"));
    const cp = el("div", { class: "cardio-pick" });
    prog.amrap.cardio.forEach(c => {
      const item = el("div", { class: "cp" + (data.amrap.cardio === c.name ? " active" : "") });
      item.appendChild(el("div", {}, c.name));
      item.appendChild(el("span", { class: "target" }, c.target));
      item.onclick = () => { data.amrap.cardio = data.amrap.cardio === c.name ? null : c.name; save(); render(); };
      cp.appendChild(item);
    });
    cardioBlock.appendChild(cp);
    sec.appendChild(cardioBlock);

    wrap.appendChild(sec);
  }

  // Conditioning
  if (prog.conditioning) {
    const sec = el("div", { class: "section" });
    sec.appendChild(el("div", { class: "section-head" }, [
      el("h2", {}, prog.conditioning.title.toUpperCase()),
    ]));
    if (prog.conditioning.meta) sec.appendChild(el("div", { class: "meta-line" }, prog.conditioning.meta));

    const opts = el("div", { class: "conditioning-options" });
    prog.conditioning.options.forEach(opt => {
      const row = el("div", { class: "cond-option" + (data.conditioning === opt.key ? " active" : "") });
      row.appendChild(el("div", { class: "cond-radio" }));
      const body = el("div", { class: "cond-body" });
      body.appendChild(el("div", { class: "cond-name" }, `Option ${opt.key}: ${opt.name}`));
      if (opt.detail) body.appendChild(el("div", { class: "cond-detail" }, opt.detail));
      if (opt.target) body.appendChild(el("div", { class: "cond-target" }, opt.target));
      row.appendChild(body);
      row.onclick = () => { data.conditioning = data.conditioning === opt.key ? null : opt.key; save(); render(); };
      opts.appendChild(row);
    });
    sec.appendChild(opts);
    wrap.appendChild(sec);
  }

  // Session Notes
  const notes = el("div", { class: "section" });
  notes.appendChild(el("div", { class: "section-head" }, [el("h2", {}, "SESSION NOTES")]));
  const ta = el("textarea");
  ta.placeholder = "How did it feel? Energy, form cues, soreness…";
  ta.value = data.notes;
  ta.addEventListener("input", e => { data.notes = e.target.value; save(); });
  notes.appendChild(ta);
  wrap.appendChild(notes);

  // Complete
  const btn = el("button", { class: "complete-btn" + (data.completed ? " done" : "") });
  btn.textContent = data.completed ? "✓ Day Complete" : "Mark Day Complete";
  btn.onclick = () => { data.completed = !data.completed; save(); render(); };
  wrap.appendChild(btn);

  return wrap;
}

function downloadSelf() {
  // Re-fetch the original document — clearer than serializing live DOM with stateful inputs
  fetch(location.href).then(r => r.text()).then(text => {
    const blob = new Blob([text], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "inh2f-week1.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }).catch(() => {
    // Fallback: serialize current DOM
    const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "inh2f-week1.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });
}

function resetWeek() {
  if (!confirm("Erase all Week 1 data on this device?")) return;
  localStorage.removeItem(STORAGE_KEY);
  state = blankState();
  render();
}

render();
</script>
