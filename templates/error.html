<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ code }} — Cerasus Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8F9FA; color: #1A1A2E; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .error-container { text-align: center; max-width: 480px; padding: 48px 32px; }
    .error-code { font-size: 96px; font-weight: 800; color: #C8102E; line-height: 1; margin-bottom: 16px; }
    .error-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .error-desc { font-size: 15px; color: #6B7280; line-height: 1.6; margin-bottom: 32px; }
    .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; transition: all 0.15s; }
    .btn-primary { background: #C8102E; color: white; }
    .btn-primary:hover { background: #A00D24; }
    .btn-secondary { background: white; color: #374151; border: 1px solid #D1D5DB; }
    .btn-secondary:hover { background: #F3F4F6; }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">{{ code }}</div>
    <h1 class="error-title">{{ message }}</h1>
    <p class="error-desc">{{ description }}</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">&#127968; Go Home</a>
      <a href="javascript:history.back()" class="btn btn-secondary">&#8592; Go Back</a>
    </div>
  </div>
</body>
</html>
