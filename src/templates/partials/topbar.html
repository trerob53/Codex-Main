<header class="topbar">
  <input type="text" class="form-input" style="max-width:360px; min-height:36px; font-size:13px;"
         placeholder="Search officers, infractions, DAs..."
         oninput="debounceSearch(this, 'search-results', '/search')">

  <div style="flex:1;"></div>

  {% if current_user %}
  <!-- Online users indicator -->
  <div id="online-indicator" hx-get="{{ url_for('api.online_users') }}" hx-trigger="load, every 30s" hx-swap="innerHTML"
       style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-light);">
  </div>

  <span style="color:var(--text-light); font-size:13px;">
    {{ current_user.display_name }} / {{ current_user.role|upper }}
  </span>

  <button onclick="toggleDarkMode()" class="btn btn-ghost btn-sm" title="Toggle dark mode">
    {{ 'LIGHT' if dark_mode else 'DARK' }}
  </button>

  <a href="{{ url_for('auth.change_password') }}" class="btn btn-ghost btn-sm">PASSWORD</a>
  <form method="post" action="{{ url_for('auth.logout') }}" style="display:inline;margin:0;">
    <button type="submit" class="btn btn-ghost btn-sm" style="color:var(--danger);">LOGOUT</button>
  </form>
  {% endif %}
</header>

<!-- Search results dropdown -->
<div id="search-results" style="display:none; position:absolute; top:56px; left:260px; right:0; z-index:50; padding:0 28px;">
  <div class="card" style="padding:8px; max-height:400px; overflow-y:auto;"></div>
</div>
